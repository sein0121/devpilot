spring:
  datasource:
    url: jdbc:mysql://localhost:3307/devpilot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: devpilot
    password: devpilot
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # 운영(prod)에서는 validate 또는 Flyway/Liquibase를 씁니다
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email